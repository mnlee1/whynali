<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
      background-color: #0d0d0d;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-image: url('{{bg_image_url}}');
      background-size: cover;
      background-position: center top;
    }

    /* 상단 보라 포인트 바 */
    .top-accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #7C3AED 0%, #9333EA 60%, #a855f7 100%);
    }

    .gradient-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 300px;
      height: 1050px;
      background: linear-gradient(
        to bottom,
        rgba(5, 5, 5, 0) 0%,
        rgba(5, 5, 5, 0.45) 35%,
        rgba(5, 5, 5, 0.88) 65%,
        rgba(5, 5, 5, 0.97) 100%
      );
    }

    /* 타이틀 + 설명글 플렉스 컨테이너 — 하단 기준으로 위로 쌓임 */
    .content-block {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 240px;
      padding: 0 90px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sub-title {
      font-family: 'Pretendard', sans-serif;
      font-weight: 800;
      font-size: 72px;
      color: #ffffff;
      line-height: 1.2;
      letter-spacing: -2px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      margin-bottom: 20px;
      word-break: keep-all;
    }

    .desc {
      font-family: 'Pretendard', sans-serif;
      font-weight: 400;
      font-size: 36px;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.7;
      white-space: pre-line;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    /* 하단 바 */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 94px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(124, 58, 237, 0.3);
      background: rgba(0,0,0,0.2);
    }

    .bottom-logo {
      width: 83px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .arrow {
      position: absolute;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      height: 29.46px;
    }
  </style>
</head>
<body>
  <div class="top-accent-bar"></div>
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>

  <div class="content-block">
    <div class="sub-title">{{sub_title}}</div>
    <div class="desc">{{desc}}</div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-logo">
      <img src="{{logo_image_url}}" alt="왜난리">
    </div>
    <svg class="arrow" viewBox="0 0 120 29.4558" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M119.414 16.1421C120.195 15.3611 120.195 14.0948 119.414 13.3137L106.686 0.585787C105.905 -0.195262 104.639 -0.195262 103.858 0.585787C103.077 1.36684 103.077 2.63317 103.858 3.41421L115.172 14.7279L103.858 26.0416C103.077 26.8227 103.077 28.089 103.858 28.8701C104.639 29.6511 105.905 29.6511 106.686 28.8701L119.414 16.1421ZM0 14.7279V16.7279H118V14.7279V12.7279H0V14.7279Z" fill="#FFFFFF"/>
    </svg>
  </div>

</body>
</html>
