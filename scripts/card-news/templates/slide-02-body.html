<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
      background-color: #ffffff;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-image: url('{{bg_image_url}}');
      background-size: cover;
      background-position: center top;
    }

    .gradient-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 408px;
      height: 942px;
      background: linear-gradient(
        to bottom,
        rgba(5, 5, 5, 0) 0%,
        rgba(5, 5, 5, 0.5) 50%,
        rgba(5, 5, 5, 0.92) 100%
      );
    }

    /* #sub-title: x=90, y=957, 60px ExtraBold */
    .sub-title {
      position: absolute;
      left: 90px;
      top: 957px;
      width: 800px;
      font-family: 'Pretendard', sans-serif;
      font-weight: 800;
      font-size: 60px;
      color: #ffffff;
      line-height: normal;
    }

    /* #desc: x=90, y=1048, 35px Light */
    .desc {
      position: absolute;
      left: 90px;
      top: 1048px;
      width: 800px;
      font-family: 'Pretendard', sans-serif;
      font-weight: 300;
      font-size: 35px;
      color: #ffffff;
      line-height: 52.5px;
      white-space: pre-line;
    }

    /* 하단 로고 이미지 — 가운데 정렬 */
    .bottom-logo {
      position: absolute;
      left: 50%;
      top: 1265px;
      transform: translateX(-50%);
      width: 83px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* 화살표: 오른쪽 끝, 로고와 수직 중앙 정렬 */
    .arrow {
      position: absolute;
      right: 70px;
      top: 1290px;
      transform: translateY(-50%);
      width: 120px;
      height: 29.46px;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="gradient-overlay"></div>
  <div class="sub-title">{{sub_title}}</div>
  <div class="desc">{{desc}}</div>
  
  <div class="bottom-logo">
    <img src="{{logo_image_url}}" alt="왜난리">
  </div>
  
  <svg class="arrow" viewBox="0 0 120 29.4558" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M119.414 16.1421C120.195 15.3611 120.195 14.0948 119.414 13.3137L106.686 0.585787C105.905 -0.195262 104.639 -0.195262 103.858 0.585787C103.077 1.36684 103.077 2.63317 103.858 3.41421L115.172 14.7279L103.858 26.0416C103.077 26.8227 103.077 28.089 103.858 28.8701C104.639 29.6511 105.905 29.6511 106.686 28.8701L119.414 16.1421ZM0 14.7279V16.7279H118V14.7279V12.7279H0V14.7279Z" fill="#FFFFFF"/>
  </svg>
</body>
</html>
