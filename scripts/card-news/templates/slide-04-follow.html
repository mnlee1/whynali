<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
      background-color: #f3dffb;
      font-family: 'Pretendard', sans-serif;
    }

    /* 흰색 프로필 카드 박스 — Figma: x=281, y=138, w=519, h=652, r=64 */
    .profile-box {
      position: absolute;
      left: 281px;
      top: 138px;
      width: 519px;
      height: 652px;
      background: #ffffff;
      border-radius: 64px;
    }

    /* 로고 원 — Figma: x=411, y=208, w=260, h=260 */
    .logo-circle {
      position: absolute;
      left: 411px;
      top: 208px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.20);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-circle img {
      width: 182px;
      height: 109px;
      object-fit: contain;
    }

    /* 브랜드명 "왜난리" — Figma: x=489, y=496, 40px ExtraBold */
    .brand-name {
      position: absolute;
      left: 489px;
      top: 496px;
      width: 104px;
      font-size: 40px;
      font-weight: 800;
      color: #000000;
      text-align: center;
      line-height: 47.73px;
    }

    /* 핸들 "why_nali" — Figma: x=477, y=557, 32px SemiBold */
    .brand-handle {
      position: absolute;
      left: 477px;
      top: 557px;
      width: 127px;
      font-size: 32px;
      font-weight: 600;
      color: #555555;
      text-align: center;
      line-height: 38.19px;
    }

    /* Follow 버튼 — Figma: x=416, y=637, w=249, h=84, r=16 */
    .follow-btn {
      position: absolute;
      left: 416px;
      top: 637px;
      width: 249px;
      height: 84px;
      background: #131313;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .follow-btn span {
      font-size: 32px;
      font-weight: 600;
      color: #ffffff;
    }

    /* CTA 텍스트 — Figma: x=140, y=830, w=800, 35px SemiBold center */
    .desc-text {
      position: absolute;
      left: 140px;
      top: 830px;
      width: 800px;
      font-size: 35px;
      font-weight: 600;
      color: #131313;
      text-align: center;
      line-height: 52.5px;
    }

    /* whynali.com 텍스트에 흰색 배경 */
    .url-highlight {
      background: #ffffff;
      padding: 2px 8px;
      display: inline-block;
    }

    /* 하단 로고 이미지 — 가운데 정렬 */
    .bottom-logo {
      position: absolute;
      left: 50%;
      top: 1265px;
      transform: translateX(-50%);
      width: 83px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="profile-box"></div>

  <div class="logo-circle">
    <img src="{{logo_image_url}}" alt="왜난리">
  </div>

  <div class="brand-name">왜난리</div>
  <div class="brand-handle">why_nali</div>

  <div class="follow-btn">
    <span>Follow</span>
  </div>

  <div class="desc-text">
    왜난리 팔로우하고,<br>
    이슈 정보 찾느라 시간 낭비 그만 🖐️<br>
    타임라인으로 한눈에 정리 해드립니다 👀<br>
    <br>
    👉 <span class="url-highlight">whynali.com</span><br>
    ' 왜난리 '를 검색하세요!
  </div>

  <div class="bottom-logo">
    <img src="{{logo_image_url}}" alt="왜난리">
  </div>

</body>
</html>
