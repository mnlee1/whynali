name: Cron - Generate Naver Blog Draft

# Vercel Cron으로 실행됨 (vercel.json: "*/10 * * * *")
on:
    workflow_dispatch:  # 수동 실행 가능

jobs:
    generate-naver-blog-draft:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Generate Naver Blog Draft API 호출
              run: |
                  response=$(curl -fsS -X GET \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                    -H "Content-Type: application/json" \
                    --max-time 540 \
                    https://whynali.vercel.app/api/cron/generate-naver-blog-draft 2>&1)
                  echo "$response"
