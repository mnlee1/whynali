name: Dooray push notification
on:
    push:
        branches: [main, develop]
jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 2

            - name: Get changed files
              id: changed
              run: |
                  git diff --name-only HEAD^ HEAD > changed_files.txt
                  cat changed_files.txt
                  echo "files<<EOF" >> $GITHUB_OUTPUT
                  cat changed_files.txt >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Check common files
              id: check
              run: |
                  if grep -qE '(common|shared|components/common|utils/common|styles/common)' changed_files.txt; then
                      echo "is_common=true" >> $GITHUB_OUTPUT
                  else
                      echo "is_common=false" >> $GITHUB_OUTPUT
                  fi

            - name: Notify Dooray (common files)
              if: steps.check.outputs.is_common == 'true'
              env:
                  DOORAY_WEBHOOK_URL: ${{ secrets.DOORAY_WEBHOOK_URL }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [ -z "$DOORAY_WEBHOOK_URL" ]; then exit 0; fi
                  REPO="${{ github.repository }}"
                  BRANCH="${GITHUB_REF#refs/heads/}"
                  COMMIT="${{ github.sha }}"
                  ACTOR="${{ github.actor }}"
                  COMMIT_URL="https://github.com/$REPO/commit/$COMMIT"
                  FILES=$(cat changed_files.txt | sed 's/^/• /' | tr '\n' '\n')
                  
                  # JSON 안전하게 이스케이프
                  MSG_ESCAPED=$(echo "$COMMIT_MSG" | jq -Rs .)
                  FILES_ESCAPED=$(echo "$FILES" | jq -Rs .)
                  
                  BODY=$(jq -n \
                      --arg botName "Git 알림" \
                      --arg text "🚨 공통 파일이 업데이트되었습니다!" \
                      --arg title "커밋 보기" \
                      --arg titleLink "$COMMIT_URL" \
                      --argjson msg "$MSG_ESCAPED" \
                      --argjson files "$FILES_ESCAPED" \
                      --arg actor "$ACTOR" \
                      --arg url "$COMMIT_URL" \
                      '{
                          botName: $botName,
                          text: $text,
                          attachments: [{
                              title: $title,
                              titleLink: $titleLink,
                              text: ("📝 변경된 파일:\n" + $files + "\n\n👤 작업자: " + $actor + "\n💬 커밋 메시지: " + $msg + "\n🔗 커밋 링크: " + $url + "\n\n⚠️ 팀원 여러분, git pull 하세요!"),
                              color: "red"
                          }]
                      }'
                  )
                  
                  curl -s -X POST "$DOORAY_WEBHOOK_URL" \
                      -H "Content-Type: application/json" \
                      -d "$BODY"

            - name: Notify Dooray (normal push)
              if: steps.check.outputs.is_common == 'false'
              env:
                  DOORAY_WEBHOOK_URL: ${{ secrets.DOORAY_WEBHOOK_URL }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [ -z "$DOORAY_WEBHOOK_URL" ]; then exit 0; fi
                  REPO="${{ github.repository }}"
                  BRANCH="${GITHUB_REF#refs/heads/}"
                  COMMIT="${{ github.sha }}"
                  ACTOR="${{ github.actor }}"
                  COMMIT_URL="https://github.com/$REPO/commit/$COMMIT"
                  
                  # JSON 안전하게 이스케이프
                  MSG_ESCAPED=$(echo "$COMMIT_MSG" | jq -Rs .)
                  
                  BODY=$(jq -n \
                      --arg botName "Git 알림" \
                      --arg text "📢 새로운 커밋이 푸시되었습니다" \
                      --arg title "커밋 보기" \
                      --arg titleLink "$COMMIT_URL" \
                      --argjson msg "$MSG_ESCAPED" \
                      --arg actor "$ACTOR" \
                      --arg branch "$BRANCH" \
                      --arg url "$COMMIT_URL" \
                      '{
                          botName: $botName,
                          text: $text,
                          attachments: [{
                              title: $title,
                              titleLink: $titleLink,
                              text: ("👤 작업자: " + $actor + "\n📝 브랜치: " + $branch + "\n💬 커밋 메시지: " + $msg + "\n🔗 커밋 링크: " + $url),
                              color: "blue"
                          }]
                      }'
                  )
                  
                  curl -s -X POST "$DOORAY_WEBHOOK_URL" \
                      -H "Content-Type: application/json" \
                      -d "$BODY"