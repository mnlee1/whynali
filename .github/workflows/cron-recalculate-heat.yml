name: 화력 재계산 Cron

# Vercel Cron으로 이전됨 (vercel.json 참고)
on:
  workflow_dispatch:

jobs:
  recalculate-heat:
    runs-on: ubuntu-latest
    steps:
      - name: 화력 재계산 API 호출
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/recalculate-heat \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 60)
          echo "$response"
