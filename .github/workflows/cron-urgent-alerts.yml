name: 긴급 이슈 Dooray 알림

on:
    schedule:
        - cron: '0 * * * *'
    workflow_dispatch:

jobs:
    send-urgent-alerts:
        runs-on: ubuntu-latest
        steps:
            - name: 환경별 URL 설정
              id: env
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    echo "url=https://whynali.vercel.app" >> $GITHUB_OUTPUT
                    echo "env_name=Production" >> $GITHUB_OUTPUT
                  else
                    echo "url=https://dev-whynali.vercel.app" >> $GITHUB_OUTPUT
                    echo "env_name=Develop" >> $GITHUB_OUTPUT
                  fi
            
            - name: 긴급 이슈 Dooray 알림 전송 (${{ steps.env.outputs.env_name }})
              run: |
                  curl -X GET ${{ steps.env.outputs.url }}/api/cron/send-urgent-alerts \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --max-time 60 \
                    --retry 2
