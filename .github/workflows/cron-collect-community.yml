name: 커뮤니티 수집 Cron

# Vercel Cron으로 이전됨 (vercel.json 참고)
# GitHub Actions는 1분 간격을 지원하지 않으므로 수동 실행만 허용

on:
  workflow_dispatch:

jobs:
  collect-community:
    runs-on: ubuntu-latest
    steps:
      - name: 커뮤니티 수집 API 호출 (수동)
        run: |
          curl -fsS -X GET https://whynali.vercel.app/api/cron/collect-community \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 60
          echo "HTTP 상태: $?"
