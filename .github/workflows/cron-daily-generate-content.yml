name: Cron - 토론/투표 일일 자동생성

on:
    schedule:
        - cron: '0 3 * * *'  # UTC 03:00 = KST 12:00
    workflow_dispatch:

jobs:
    daily-generate-content:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: 환경별 URL 설정
              id: env
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    echo "url=https://whynali.vercel.app" >> $GITHUB_OUTPUT
                    echo "env_name=Production" >> $GITHUB_OUTPUT
                  else
                    echo "url=https://dev-whynali.vercel.app" >> $GITHUB_OUTPUT
                    echo "env_name=Develop" >> $GITHUB_OUTPUT
                  fi

            - name: 토론/투표 자동생성 (${{ steps.env.outputs.env_name }})
              run: |
                  curl -X GET ${{ steps.env.outputs.url }}/api/cron/daily-generate-content \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                    -H "User-Agent: GitHub-Actions" \
                    --max-time 90 \
                    --retry 1
