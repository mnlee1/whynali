name: Cron - 토론/투표 일일 자동생성

on:
  schedule:
    - cron: '0 3 * * *'  # UTC 03:00 = KST 12:00
  workflow_dispatch:

jobs:
  daily-generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 토론/투표 자동생성 API 호출
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/daily-generate-content \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 540)
          echo "$response"
