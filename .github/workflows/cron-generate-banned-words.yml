name: AI 금칙어 자동 생성 Cron

on:
  schedule:
    - cron: '0 18 * * 0'  # 매주 일요일 03:00 KST = 18:00 UTC (토요일)
  workflow_dispatch:

jobs:
  generate-banned-words:
    runs-on: ubuntu-latest
    steps:
      - name: AI 금칙어 자동 생성 API 호출
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/generate-banned-words \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 120)
          echo "$response"
