name: 이슈 후보 자동 생성 Cron (비활성화 - 트랙 A로 통합)

on:
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  auto-create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: 환경별 URL 설정
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "url=https://whynali.vercel.app" >> $GITHUB_OUTPUT
            echo "env_name=Production" >> $GITHUB_OUTPUT
          else
            echo "url=https://dev-whynali.vercel.app" >> $GITHUB_OUTPUT
            echo "env_name=Develop" >> $GITHUB_OUTPUT
          fi
      
      - name: 이슈 후보 자동 생성 API 호출 (${{ steps.env.outputs.env_name }})
        run: |
          curl -X GET ${{ steps.env.outputs.url }}/api/cron/auto-create-issue \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 60 \
            --retry 2
