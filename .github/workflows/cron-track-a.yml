name: Cron - Track A

# Vercel Cron으로 이전됨 (vercel.json 참고)
on:
    workflow_dispatch:  # 수동 실행 가능

jobs:
    track-a:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Track A API 호출
              run: |
                  response=$(curl -fsS \
                    -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                    --max-time 540 \
                    https://whynali.vercel.app/api/cron/track-a 2>&1)
                  echo "$response"
