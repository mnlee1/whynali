name: 토론 주제 AI 자동 생성 Cron

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 12:00 KST = 03:00 UTC
  workflow_dispatch:

jobs:
  auto-generate-discussions:
    runs-on: ubuntu-latest
    steps:
      - name: 토론 주제 AI 자동 생성 API 호출
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/auto-generate-discussions \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 120)
          echo "$response"
