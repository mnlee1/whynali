name: Debug - 커뮤니티 HTML 구조 확인

on:
  workflow_dispatch:
    inputs:
      site:
        description: '확인할 사이트'
        required: true
        type: choice
        options:
          - clien
          - bobaedream
          - ppomppu

jobs:
  debug-html:
    runs-on: ubuntu-latest
    steps:
      - name: 클리앙 HTML 출력
        if: github.event.inputs.site == 'clien'
        run: |
          HTML=$(curl -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://www.clien.net/service/group/board_all")
          TOTAL=$(echo "$HTML" | wc -l)
          echo "=== 전체 HTML 줄 수: $TOTAL ==="
          echo "=== list_row / list_subject / timestamp 관련 줄 ==="
          echo "$HTML" | grep -n "list_row\|list_subject\|subject_fixed\|symph_row\|timestamp\|reply_num\|\.hit" | head -80
          echo ""
          echo "=== HTML 중반부 (게시글 목록 위치 추정) ==="
          MID=$((TOTAL / 2))
          echo "$HTML" | sed -n "${MID},$((MID+100))p"

      - name: 보배드림 HTML 출력
        if: github.event.inputs.site == 'bobaedream'
        run: |
          HTML=$(curl -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://www.bobaedream.co.kr/list?code=freeb")
          TOTAL=$(echo "$HTML" | wc -l)
          echo "=== 전체 줄 수: $TOTAL ==="
          echo "=== boardlist tbody 첫 5개 tr 구조 ==="
          echo "$HTML" | sed -n '/id="boardlist"/,/<!--cList/p' | head -200

      - name: 뽐뿌 HTML 출력
        if: github.event.inputs.site == 'ppomppu'
        run: |
          HTML=$(curl -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "https://www.ppomppu.co.kr/zboard/zboard.php?id=freeboard")
          echo "=== tr_ / list_title / baseList 포함 줄 ==="
          echo "$HTML" | grep -n 'id="tr_\|list_title\|baseList\|replynum\|list_vspace' | head -60
          echo "=== 게시글 목록 영역 ==="
          echo "$HTML" | sed -n '/id="tr_/,+10p' | head -150
