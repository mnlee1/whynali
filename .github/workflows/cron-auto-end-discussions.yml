name: 토론 주제 자동 마감 Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  auto-end-discussions:
    runs-on: ubuntu-latest
    steps:
      - name: 토론 주제 자동 마감 API 호출
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/auto-end-discussions \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 60)
          echo "$response"
