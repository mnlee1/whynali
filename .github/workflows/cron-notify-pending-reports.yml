name: Cron - Notify Pending Reports

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 12:00 KST = 03:00 UTC
  workflow_dispatch:

jobs:
  notify-pending-reports:
    runs-on: ubuntu-latest
    steps:
      - name: 미처리 신고 알림 전송
        run: |
          response=$(curl -fsS -X GET https://whynali.vercel.app/api/cron/notify-pending-reports \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions" \
            --max-time 60)
          echo "$response"
